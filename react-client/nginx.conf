# WebSocket 업그레이드 헤더 매핑 (http 컨텍스트)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 큰 파일 업로드/다운로드 허용 (이미지/파일 첨부)
    client_max_body_size 50m;

    # Docker 내장 DNS — proxy_pass 를 변수로 두면 "기동 시점"이 아니라 "요청 시점"에
    # 업스트림을 해석한다. 백엔드 컨테이너가 늦게 뜨거나 잠깐 재시작해도 웹이 죽지 않음.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 안드로이드 APK 다운로드 — 올바른 MIME 으로 내려줌
    #   http://<PC LAN IP>:5173/app.apk
    location = /app.apk {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="kakao-clone.apk"';
    }

    # ---- Spring 사이드카 (:8080) : 로그인/공지/번역/파일 ----
    location /auth      { set $spring http://xmpp-spring:8080; proxy_pass $spring$request_uri; proxy_set_header Host $host; }
    location /admin     { set $spring http://xmpp-spring:8080; proxy_pass $spring$request_uri; proxy_set_header Host $host; }
    location /users     { set $spring http://xmpp-spring:8080; proxy_pass $spring$request_uri; proxy_set_header Host $host; }
    location /translate { set $spring http://xmpp-spring:8080; proxy_pass $spring$request_uri; proxy_set_header Host $host; }
    location /files     { set $spring http://xmpp-spring:8080; proxy_pass $spring$request_uri; proxy_set_header Host $host; }

    # ---- 공지 WS (Spring) ----
    location /ws/notice {
        set $spring http://xmpp-spring:8080;
        proxy_pass $spring$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ---- 채팅 WS (plain-ws :8090) ----
    location /ws {
        set $chat http://xmpp-chat:8090;
        proxy_pass $chat$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ---- plain-ws Redis 상태 조회 ----
    location /redis-state {
        set $chat http://xmpp-chat:8090;
        proxy_pass $chat$request_uri;
        proxy_set_header Host $host;
    }

    # ---- SPA 라우팅 폴백 ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
