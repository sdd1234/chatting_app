services:
  ##
  ## PostgreSQL — mod_mam(메시지 영구저장) 백엔드
  ##
  xmpp-db:
    image: postgres:16
    container_name: xmpp-db
    hostname: xmpp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mongooseim
      POSTGRES_PASSWORD: mongooseim_secret
      POSTGRES_DB: mongooseim
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg-init/pg.sql:/docker-entrypoint-initdb.d/01-pg.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mongooseim"]
      interval: 10s
      timeout: 5s
      retries: 5

  xmpp-server:
    image: mongooseim/mongooseim:latest
    container_name: xmpp-server
    hostname: mongooseim    # ⚠️ Erlang 노드 ID — Mnesia 데이터 보존 위해 유지
    restart: unless-stopped
    depends_on:
      xmpp-db:
        condition: service_healthy

    ports:
      - "5222:5222"   # XMPP C2S (Gajim 클라이언트)
      - "5269:5269"   # XMPP S2S (서버간 통신)
      - "5280:5280"   # HTTP BOSH / WebSocket
      - "5285:5285"   # HTTP BOSH / WebSocket (TLS)
      - "5551:5551"   # GraphQL Admin REST API
      - "5541:5541"   # GraphQL Domain Admin API
      - "5561:5561"   # GraphQL User API
      - "9091:9091"   # Prometheus 메트릭

    volumes:
      # 로컬 설정 파일을 컨테이너 안으로 마운트 (/member/ 가 start.sh 탐색 경로)
      - ./config/mongooseim.toml:/member/mongooseim.toml:ro
      # Mnesia DB 영속 볼륨 (컨테이너 재생성 시 계정/데이터 보존)
      - mongooseim_data:/var/lib/mongooseim

    environment:
      - MONGOOSEIM_CONFIG_FORMAT=toml
      # 싱글 노드만 운영 — 기본 동작(존재하지 않는 mongooseim@mongooseim-1 에 클러스터 합류)이
      # 콜드 부팅 첫 시도를 ~5s 만에 죽이고 restart 정책으로 재기동시킴. 그동안 compose 는
      # "dependency unhealthy" 로 xmpp-spring 을 포기해 시드가 안 도는 데드락이 발생.
      - JOIN_CLUSTER=false

    healthcheck:
      test: ["CMD", "mongooseimctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      # 콜드 부팅(빈 Mnesia)에서 Erlang VM + 스키마 부팅이 30s 초과 → spring 이 dependency unhealthy 로 포기.
      # 여유롭게 120s. start_period 동안은 healthcheck 실패가 retries 카운트에 안 잡힘.
      start_period: 120s

  ##
  ## MinIO — S3 호환 오브젝트 스토리지 (이미지/파일 업로드용)
  ##
  xmpp-storage:
    image: minio/minio:latest
    container_name: xmpp-storage
    hostname: xmpp-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9011:9001"    # 웹 콘솔 (호스트 포트 9011, 컨테이너 9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  ##
  ## Redis — plain-ws/ 채팅 서버의 메시지/오프라인 큐 휘발성 저장소
  ## (MongooseIM은 이걸 안 씀. plain-ws 전용)
  ##
  xmpp-redis:
    image: redis:7-alpine
    container_name: xmpp-redis
    hostname: xmpp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "no"                   # AOF 끔 (휘발성 목적)
      - --save
      - ""                     # RDB 스냅샷도 끔 → 완전 in-memory
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"          # 메모리 차면 LRU evict
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ##
  ## Spring Boot 사이드카 — 공지/로그인/토큰발급 담당
  ## - JWT 발급 (HS256)
  ## - 공지 WS push: ws://localhost:8081/ws/notice?token=<JWT>
  ## - Redis pub/sub("notice.broadcast")로 멀티 인스턴스 fan-out
  ##
  xmpp-spring:
    build: ./spring-server
    container_name: xmpp-spring
    hostname: xmpp-spring
    restart: unless-stopped
    depends_on:
      xmpp-redis:
        condition: service_healthy
      xmpp-db:
        condition: service_healthy
      # MongooseIM 도 healthy 까지 대기 — 안 그러면 부팅 시점 시드(admin/jihoon/emma/minho)
      # registerUser 호출이 :5551 connection refused 로 실패해, Redis 엔 role 만 박히고
      # Mongoose 엔 계정이 없는 좀비 상태가 됨 → 로그인 401, 가입 409 데드락.
      xmpp-server:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      REDIS_HOST: xmpp-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-demo-secret-change-me-32bytes-minimum-please-xx}
      JWT_EXPIRATION_MS: "3600000"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      MONGOOSE_GRAPHQL_URL:  http://xmpp-server:5551/api/graphql
      MONGOOSE_GRAPHQL_USER: admin
      MONGOOSE_GRAPHQL_PASS: secret
      FILE_STORAGE_DIR: /data/uploads
      DB_URL:  jdbc:postgresql://xmpp-db:5432/mongooseim
      DB_USER: mongooseim
      DB_PASS: mongooseim_secret
    volumes:
      # 업로드 파일을 호스트(바탕화면 프로젝트 폴더)에 영속. git 은 .gitignore 로 제외.
      - ./spring-server/uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  ##
  ## plain-ws — 실제 채팅 라우터 (Node + ws). MongooseIM 안 거침.
  ## - 채팅 WebSocket: ws://localhost:8090/ws
  ## - 데모 화면:      http://localhost:8090/test.html
  ## - Redis = 세션 + 오프라인 큐 (휘발성). 메시지는 Mongoose에 GraphQL 미러링.
  ## - JWT_SECRET 은 반드시 xmpp-spring 과 동일해야 함(같은 기본값 사용).
  ##
  xmpp-chat:
    build: ./plain-ws
    container_name: xmpp-chat
    hostname: xmpp-chat
    restart: unless-stopped
    depends_on:
      xmpp-redis:
        condition: service_healthy
    ports:
      - "8090:8090"   # 채팅 WS + 데모 정적 페이지(test.html)
    environment:
      PORT: "8090"
      REDIS_URL: redis://xmpp-redis:6379
      JWT_SECRET: ${JWT_SECRET:-demo-secret-change-me-32bytes-minimum-please-xx}
      MONGOOSE_GRAPHQL_URL: http://xmpp-server:5551/api/graphql
      MONGOOSE_GRAPHQL_USER: admin
      MONGOOSE_GRAPHQL_PASS: secret
      MONGOOSE_DOMAIN: localhost
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  ##
  ## React 카톡 웹 UI — vite 정적빌드를 nginx 로 서빙 + 백엔드 리버스프록시
  ## - 웹:        http://localhost:5173  (폰: http://<PC LAN IP>:5173)
  ## - APK 다운:  http://localhost:5173/app.apk  → 안드로이드 설치
  ## - 상대경로(/auth /users /ws /ws/notice ...)를 nginx 가 백엔드 컨테이너로 프록시
  ##   → 클론한 쪽은 Node 설치 없이 docker compose up 한 줄로 웹까지 뜸
  ##
  xmpp-web:
    build: ./react-client
    container_name: xmpp-web
    hostname: xmpp-web
    restart: unless-stopped
    depends_on:
      - xmpp-spring
      - xmpp-chat
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  ##
  ## 1회성: 버킷 생성 + 익명 다운로드 허용
  ##
  xmpp-storage-init:
    image: minio/mc:latest
    container_name: xmpp-storage-init
    depends_on:
      xmpp-storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://xmpp-storage:9000 minioadmin minioadmin &&
      (mc mb -p local/mongooseim-uploads || true) &&
      mc anonymous set download local/mongooseim-uploads &&
      echo 'minio-init done'
      "
    restart: "no"

volumes:
  mongooseim_data:
  minio_data:
  postgres_data:
